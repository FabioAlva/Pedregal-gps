services:
  db:
    image: postgres:17-alpine
    container_name: my_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
  
    image: redis:8.4-alpine
    container_name: my_cache
    restart: always 
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data  
volumes:
  postgres_data:
  redis_data:
